services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lightsoff
    volumes:
      - lightsoff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lightsoff"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  lightsoff_pgdata:
