name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lightsoff/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lightsoff/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lightsoff

      # Project pages are served from /<repo-name>/, so the asset base must match
      - name: Build
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: lightsoff

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: lightsoff/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
