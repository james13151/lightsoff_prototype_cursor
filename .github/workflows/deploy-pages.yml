name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lightsoff/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lightsoff/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lightsoff

      # Project pages are served from /<repo-name>/, so the asset base must match
      - name: Build
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: lightsoff

      # SPA fallback + skip Jekyll processing (required for client-side routing on Pages)
      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
        working-directory: lightsoff

      # Auto-enable Pages on first deploy (requires public repo + administration: write)
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: lightsoff/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
