name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lightsoff/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress deploys — cancelling mid-flight can wedge Pages for ~10–60 min.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lightsoff/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lightsoff

      # Project pages are served from /<repo-name>/, so the asset base must match
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: lightsoff

      # SPA fallback + skip Jekyll processing (required for client-side routing on Pages)
      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
        working-directory: lightsoff

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: lightsoff/dist

      # Pages deploy API is intermittently flaky; retry before failing the workflow.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment3
        if: steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Verify deployment succeeded
        if: steps.deployment.outcome != 'success' && steps.deployment2.outcome != 'success' && steps.deployment3.outcome != 'success'
        run: |
          echo "::error::GitHub Pages deploy failed after 3 attempts. Re-run the workflow from Actions → Deploy to GitHub Pages → Run workflow."
          exit 1
